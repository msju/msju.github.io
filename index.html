<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Download</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}

img{
  width:90%;
  max-width:500px;
  cursor:pointer;
}
</style>

</head>
<body>

<h2>이미지를 클릭하면 다운로드됩니다</h2>

<a id="downloadLink">
  <img id="image">
</a>

<script>

const imageUrl = "https://picsum.photos/800/500"

const img = document.getElementById("image")
const link = document.getElementById("downloadLink")

img.src = imageUrl

// 테스트용 attachment proxy
link.href =
"https://images.weserv.nl/?url="
+ encodeURIComponent(imageUrl.replace("https://",""))
+ "&download=image.jpg"

</script>

</body>
</html>
